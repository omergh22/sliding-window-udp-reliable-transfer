          Test6-sender-output.txt | sort| uniq && tail -n 5 Test6-sender-output.txt
        input: ''
        expected-output: Sent packet\s+0\s+Sent packet\s+1\s+Sent packet\s+2\s+Sent
          packet\s+3\s+Sent packet\s+4\s+Sent packet\s+5\s+Sent packet\s+6\s+Sent
          packet\s+7\s+Sent packet\s+8\s+Sent packet\s+9\s+Resent packet\s+1\s+Resent
          packet\s+10\s+Resent packet\s+20\s+Resent packet\s+600\s+Received ACK on
          2095\s+Received ACK on 2096\s+Received ACK on 2097\s+Sent final packet\s+for
          tests\/file2.txt\s+Received ACK 2098
