          packet\s+8 valid CRC\s+Received packet\s+9 valid CRC
        comparison-method: regex
        timeout: 1
        max-score: 2
    - name: Test4 Sender
      id: test4-sender
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test4 Sender
        setup-command: ''
        command: head -n 5 Test4-sender-output.txt && grep -E 'Resent[[:space:]]+packet[[:space:]]+[[:digit:]][[:digit:]]+'
          Test4-sender-output.txt && tail -n 5 Test4-sender-output.txt
        input: ''
        expected-output: Sent packet\s+0\s+Sent packet\s+1\s+Sent packet\s+2\s+Sent
          packet\s+3\s+Sent packet\s+4\s+Resent packet\s+10\s+Resent packet\s+11\s+Resent
          packet\s+12\s+Resent packet\s+13\s+Resent packet\s+14\s+Received ACK on
          1046\s+Received ACK on 1047\s+Received ACK on 1048\s+Sent final packet\s+for
          tests\/file2.txt\s+Received ACK 1049
        comparison-method: regex
        timeout: 1
        max-score: 2
    - name: Test4 Receiver
      id: test4-receiver
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test4 Receiver
        setup-command: ''
        command: head -n 1 Test4-receiver-output.txt && grep -E 'invalid CRC' Test4-receiver-output.txt
