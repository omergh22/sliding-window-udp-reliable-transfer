name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Gradle Build JARs
      id: gradle-build-jars
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Gradle Build JARs
        setup-command: ''
        command: gradle jar
        timeout: 10
        max-score: 0
    - name: Copy Sender JAR
      id: copy-sender-jar
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Copy Sender JAR
        setup-command: ''
        command: cp SlidingWindowSender/build/libs/SlidingWindowSender-5785.jar .
        timeout: 1
        max-score: 0
    - name: Copy Receiver JAR
      id: copy-receiver-jar
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Copy Receiver JAR
        setup-command: ''
        command: cp SlidingWindowReceiver/build/libs/SlidingWindowReceiver-5785.jar
          .
        timeout: 1
        max-score: 0
    - name: Make output dir
      id: make-output-dir
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Make output dir
        setup-command: ''
        command: mkdir outfiles
        timeout: 1
        max-score: 0
    - name: Run test script
      id: run-test-script
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Run test script
        setup-command: chmod 700 sliding-window-tests.bat
        command: "./sliding-window-tests.bat"
        timeout: 10
        max-score: 0
    - name: Check file contents
      id: check-file-contents
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Check file contents
        setup-command: ''
        command: cat outfiles/file-checksum-results.txt | sort
        input: ''
        expected-output: |-
          outfiles/Test1-file1-out.txt: OK
          outfiles/Test10-file3-out.pdf: OK
          outfiles/Test11-file3-out.pdf: OK
          outfiles/Test12-file1-out.txt: OK
          outfiles/Test13-file2-out.txt: OK
          outfiles/Test14-file1-out.txt: OK
          outfiles/Test15-file2-out.txt: OK
          outfiles/Test2-file1-out.txt: OK
          outfiles/Test3-file1-out.txt: OK
          outfiles/Test4-file2-out.txt: OK
          outfiles/Test5-file2-out.txt: OK
          outfiles/Test6-file2-out.txt: OK
          outfiles/Test7-file3-out.pdf: OK
          outfiles/Test8-file3-out.pdf: OK
          outfiles/Test9-file3-out.pdf: OK
          tests/file1.txt: OK
          tests/file2.txt: OK
          tests/file3.pdf: OK
        comparison-method: contains
        timeout: 1
        max-score: 15
    - name: Test1 Sender
      id: test1-sender
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test1 Sender
        setup-command: ''
        command: head -n 3 Test1-sender-output.txt && tail -n 5 Test1-sender-output.txt
        input: ''
        expected-output: Sent packet\s+0\s+Sent packet\s+1\s+Sent packet\s+2\s+Received
          ACK on 25\s+Received ACK on 26\s+Received ACK on 27\s+Sent final packet\s+for
          tests\/file1.txt\s+Received ACK 28
        comparison-method: regex
        timeout: 1
        max-score: 3
    - name: Test1 Receiver
      id: test1-receiver
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test1 Receiver
        setup-command: ''
        command: grep -E 'Received packet[[:space:]]+[[:digit:]]+[[:space:]]+valid
          CRC$' Test1-receiver-output.txt | sort
        input: ''
        expected-output: Received packet\s+0 valid CRC\s+Received packet\s+1 valid
          CRC\s+Received packet\s+10 valid CRC\s+Received packet\s+11 valid CRC\s+Received
          packet\s+12 valid CRC\s+Received packet\s+13 valid CRC\s+Received packet\s+14
          valid CRC\s+Received packet\s+15 valid CRC\s+Received packet\s+16 valid
          CRC\s+Received packet\s+17 valid CRC\s+Received packet\s+18 valid CRC\s+Received
          packet\s+19 valid CRC\s+Received packet\s+2 valid CRC\s+Received packet\s+20
          valid CRC\s+Received packet\s+21 valid CRC\s+Received packet\s+22 valid
          CRC\s+Received packet\s+23 valid CRC\s+Received packet\s+24 valid CRC\s+Received
          packet\s+25 valid CRC\s+Received packet\s+26 valid CRC\s+Received packet\s+27
          valid CRC\s+Received packet\s+3 valid CRC\s+Received packet\s+4 valid CRC\s+Received
          packet\s+5 valid CRC\s+Received packet\s+6 valid CRC\s+Received packet\s+7
          valid CRC\s+Received packet\s+8 valid CRC\s+Received packet\s+9 valid CRC
        comparison-method: regex
        timeout: 1
        max-score: 3
    - name: Test2 Sender
      id: test2-sender
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test2 Sender
        setup-command: ''
        command: head -n 10 Test2-sender-output.txt && tail -n 5 Test2-sender-output.txt
        input: ''
        expected-output: Sent packet\s+0\s+Sent packet\s+1\s+Sent packet\s+2\s+Sent
          packet\s+3\s+Sent packet\s+4\s+Sent packet\s+5\s+Sent packet\s+6\s+Sent
          packet\s+7\s+Sent packet\s+8\s+Sent packet\s+9\s+Received ACK on 25\s+Received
          ACK on 26\s+Received ACK on 27\s+Sent final packet\s+for tests\/file1.txt\s+Received
          ACK 28
        comparison-method: regex
        timeout: 1
        max-score: 2
    - name: Test2 Receiver
      id: test2-receiver
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: Test2 Receiver
        setup-command: ''
        command: grep -E 'Received packet [[:digit:]]+ valid CRC$' Test2-receiver-output.txt
          | sort
        input: ''
        expected-output: Received packet\s+0 valid CRC\s+Received packet\s+1 valid
          CRC\s+Received packet\s+10 valid CRC\s+Received packet\s+11 valid CRC\s+Received
          packet\s+12 valid CRC\s+Received packet\s+13 valid CRC\s+Received packet\s+14
          valid CRC\s+Received packet\s+15 valid CRC\s+Received packet\s+16 valid
          CRC\s+Received packet\s+17 valid CRC\s+Received packet\s+18 valid CRC\s+Received
          packet\s+19 valid CRC\s+Received packet\s+2 valid CRC\s+Received packet\s+20
          valid CRC\s+Received packet\s+21 valid CRC\s+Received packet\s+22 valid
          CRC\s+Received packet\s+23 valid CRC\s+Received packet\s+24 valid CRC\s+Received
          packet\s+25 valid CRC\s+Received packet\s+26 valid CRC\s+Received packet\s+27
